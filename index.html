<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kripto Haber</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --text: #ffffff;
      --hint: #c9d1d9;
      --up: #3fb950; --down: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      padding: 16px; padding-bottom: 40px; }
    h1 { font-size: 20px; margin: 0 0 2px; }
    .sub { color: var(--hint); font-size: 13px; margin-bottom: 16px; }
    .sec { font-size: 13px; text-transform: uppercase; letter-spacing: .5px;
      color: var(--hint); margin: 18px 0 8px; }
    .card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .coin { display: flex; align-items: center; justify-content: space-between; }
    .coin .l .sym { font-weight: 700; }
    .coin .l .nm { color: var(--hint); font-size: 12px; }
    .coin .r { text-align: right; }
    .coin .r .px { font-weight: 600; }
    .chg.up { color: var(--up); } .chg.down { color: var(--down); }
    .news .t { font-weight: 600; margin-bottom: 4px; }
    .news .b { color: var(--hint); font-size: 14px; }
    .news a { color: #58a6ff; text-decoration: none; font-size: 14px; }
    .note { color: var(--hint); font-size: 12px; margin-top: 18px; text-align: center; }
    .err { color: var(--down); }
  </style>
</head>
<body>
  <h1 id="title">Kripto Haber</h1>
  <div class="sub" id="sub">Yükleniyor…</div>
  <div id="news"></div>

  <div class="sec">📰 Piyasa Haberleri</div>
  <div class="card" style="padding:6px;">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
      {"feedMode":"market","market":"crypto","colorTheme":"dark","isTransparent":true,"locale":"tr","width":"100%","height":420}
      </script>
    </div>
  </div>

  <div id="prices"></div>

  <div class="sec">💱 Döviz &amp; Altın</div>
  <div class="card" style="padding:6px;">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
      {"symbols":[{"description":"Dolar/TL","proName":"FX_IDC:USDTRY"},{"description":"Euro/TL","proName":"FX_IDC:EURTRY"},{"description":"Ons Altın","proName":"OANDA:XAUUSD"},{"description":"Bitcoin","proName":"BINANCE:BTCUSDT"}],"colorTheme":"dark","isTransparent":true,"displayMode":"compact","locale":"tr"}
      </script>
    </div>
  </div>
  <a href="#" id="dovizFull" class="card" style="display:block;text-align:center;color:#58a6ff;font-weight:700;text-decoration:none;margin-top:14px;">
    📊 Tüm döviz, altın &amp; haberler → doviz.com
  </a>
  <div class="note" id="note"></div>

  <script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) { tg.ready(); tg.expand(); }
    const CG = "https://api.coingecko.com/api/v3/simple/price";

    function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

    async function load() {
      let c;
      try { c = await (await fetch("content.json", {cache:"no-store"})).json(); }
      catch(e){ document.getElementById("sub").innerHTML = '<span class="err">content.json yüklenemedi</span>'; return; }

      document.getElementById("title").textContent = c.title || "Kripto Haber";
      document.getElementById("sub").textContent = "Canlı fiyatlar & son haberler";
      document.getElementById("note").textContent = c.disclaimer || "";

      // ---- Prices ----
      const coins = c.coins || [];
      const ids = coins.map(x=>x.id).filter(Boolean).join(",");
      const pricesEl = document.getElementById("prices");
      pricesEl.innerHTML = '<div class="sec">💹 Canlı Fiyatlar</div>';
      try {
        const q = `${CG}?ids=${encodeURIComponent(ids)}&vs_currencies=usd,try&include_24hr_change=true`;
        const data = await (await fetch(q)).json();
        coins.forEach(coin => {
          const d = data[coin.id]; if(!d) return;
          const chg = d.usd_24h_change || 0;
          const up = chg >= 0;
          const card = document.createElement("div");
          card.className = "card coin";
          card.innerHTML =
            `<div class="l"><div class="sym">${esc(coin.symbol)}</div><div class="nm">${esc(coin.name)}</div></div>`+
            `<div class="r"><div class="px">$${(d.usd||0).toLocaleString("en-US",{maximumFractionDigits:2})} · ₺${(d.try||0).toLocaleString("tr-TR",{maximumFractionDigits:0})}</div>`+
            `<div class="chg ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(chg).toFixed(2)}%</div></div>`;
          pricesEl.appendChild(card);
        });
      } catch(e) {
        pricesEl.innerHTML += `<div class="card err">${esc(c.prices_error||"Fiyatlar alınamadı")}</div>`;
      }

      // ---- News ----
      const news = c.news || [];
      const newsEl = document.getElementById("news");
      if (news.length) {
        newsEl.innerHTML = '<div class="sec">📰 Son Haberler</div>';
        news.forEach(n => {
          const card = document.createElement("div");
          card.className = "card news";
          let html = `<div class="t">${esc(n.title)}</div>`;
          (n.lines||[]).forEach(l => html += `<div class="b">${esc(l)}</div>`);
          if (n.url && /^https?:\/\//.test(n.url)) {
            html += `<a href="#" data-url="${esc(n.url)}">Devamı →</a>`;
          }
          card.innerHTML = html;
          newsEl.appendChild(card);
        });
        newsEl.querySelectorAll("a[data-url]").forEach(a =>
          a.addEventListener("click", ev => {
            ev.preventDefault();
            const u = a.getAttribute("data-url");
            if (tg && tg.openLink) tg.openLink(u); else window.open(u, "_blank", "noopener");
          })
        );
      }
    }

    const dovizBtn = document.getElementById("dovizFull");
    if (dovizBtn) dovizBtn.addEventListener("click", ev => {
      ev.preventDefault();
      const u = "https://www.doviz.com/";
      if (tg && tg.openLink) tg.openLink(u, { try_instant_view: false });
      else window.open(u, "_blank", "noopener");
    });

    load();
  </script>
</body>
</html>
